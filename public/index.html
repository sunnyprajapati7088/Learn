<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Library Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar: Global Library -->
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="library"></i>
                <h2>Library Hub</h2>
            </div>
            
            <div class="library-list" id="library-list">
                <div class="loading-text">Loading books...</div>
            </div>

            <!-- Footer Admin Link inside Sidebar -->
            <div class="sidebar-footer">
                <a href="/admin.html"><i data-lucide="settings"></i> Admin Portal</a>
            </div>
        </aside>

        <!-- Main Chat Panel -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h2>Ollama Library Vision</h2>
                    <p>Select a book from the sidebar to begin chatting.</p>
                </div>
            </header>

            <div class="chat-window" id="chat-window">
                <div class="message ai-message">
                    <div class="avatar"><i data-lucide="bot"></i></div>
                    <div class="bubble">
                        Welcome to the PDF Library! 📚<br/><br/>
                        Please choose a book from the list on the left. The chat will automatically restrict its answers to the text of the selected book.
                    </div>
                </div>
            </div>

            <!-- Input Form -->
            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Select a book first..." autocomplete="off" disabled>
                    <button type="submit" id="send-btn" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>
    
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
